apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-app
  template:
    metadata:
      labels:
        app: secure-app
    spec:
      containers:
      - name: app
        image: nginx:1.21

        # Use only ConfigMap for non-sensitive data
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: database_host

        volumeMounts:
        - name: config-vol
          mountPath: /etc/config

        # Mount secrets as files (more secure)
        - name: secret-vol
          mountPath: /etc/secrets
          readOnly: true

        # Basic security hardening
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"

      volumes:
      - name: config-vol
        configMap:
          name: app-config

      - name: secret-vol
        secret:
          secretName: app-secrets
